# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=0.1.0-preview'
name: __AGENT_NAME__
workflows:
  up:
    - azd: exec -- node .azd/pi-foundry/doctor.mjs
    - azd: package --all
    - azd: deploy --all
    - azd: exec -- node .azd/pi-foundry/postdeploy.mjs
services:
  __AGENT_NAME__:
    project: .
    host: azure.ai.agent
    language: docker
    docker:
      path: .azd/pi-foundry/Dockerfile
      context: .
      remoteBuild: true
    config:
      container:
        resources:
          cpu: "2"
          memory: 4Gi
      startupCommand: /app/runtime/official-invocations/entrypoint.sh
